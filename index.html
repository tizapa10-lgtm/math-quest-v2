<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mega Quest: Multiversos</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
body {
    font-family: 'Press Start 2P', cursive;
    background-color: #0f172a;
    color: #fff;
    text-align: center;
    margin: 0;
    padding: 20px;
}
.pixel-border {
    border: 4px solid #fff;
    box-shadow: 0 0 0 4px #000, 0 0 0 8px #fff;
    background-color: #1e293b;
    margin: 20px auto;
    max-width: 600px;
    padding: 20px;
}
.btn {
    background: #334155;
    border: 4px solid #000;
    color: white;
    padding: 15px 20px;
    margin: 10px;
    font-family: 'Press Start 2P', cursive;
    font-size: 10px;
    cursor: pointer;
    display: inline-block;
}
.btn:hover { background: #475569; }
.hidden { display: none !important; }
input {
    font-family: 'Press Start 2P', cursive;
    padding: 10px;
    margin: 10px;
    width: 80%;
    max-width: 300px;
}
.stat-box {
    display: inline-block;
    border: 3px solid #fff;
    padding: 10px 20px;
    margin: 5px;
    background: #000;
    font-size: 8px;
}
.option-btn {
    display: block;
    width: 100%;
    max-width: 500px;
    margin: 10px auto;
    padding: 15px;
    background: #1e293b;
    border: 3px solid #fff;
    color: white;
    font-family: 'Press Start 2P', cursive;
    font-size: 9px;
    cursor: pointer;
    text-align: left;
}
.option-btn:hover { background: #334155; }
.option-btn.correct { background: #22c55e !important; }
.option-btn.wrong { background: #ef4444 !important; }
#modal {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.9);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
}
.modal-content {
    border: 4px solid #fff;
    box-shadow: 0 0 0 4px #000, 0 0 0 8px #fff;
    background: #1e293b;
    padding: 40px;
    max-width: 400px;
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen" class="pixel-border">
    <h1 style="color: #facc15; font-size: 12px; margin-bottom: 30px;">NUEVO JUGADOR</h1>
    <input type="text" id="player-name" placeholder="NOMBRE..." style="text-align: center;" maxlength="15">
    <br>
    <button class="btn" onclick="savePlayer()">REGISTRARSE</button>
    <p id="login-error" style="color: #ef4444; font-size: 8px; margin-top: 10px; min-height: 15px;"></p>
</div>

<!-- MENU -->
<div id="menu-screen" class="hidden">
    <div style="margin-bottom: 20px;">
        <button class="btn" onclick="showScoreboard()">📊 TABLERO</button>
        <button class="btn" onclick="logout()">🔄 CAMBIAR JUGADOR</button>
    </div>
    <div style="font-size: 8px; color: #22d3ee; margin-bottom: 20px;">
        HOLA, <span id="display-name"></span>
    </div>
    <div class="pixel-border">
        <h2 style="color: #facc15; font-size: 10px; margin-bottom: 20px;">ELIGE TU AVENTURA</h2>
        <button class="btn" onclick="start('matematicas')" style="display: block; width: 80%; margin: 10px auto;">🧮 MATEMÁTICAS</button>
        <button class="btn" onclick="start('espanol')" style="display: block; width: 80%; margin: 10px auto;">📚 ESPAÑOL</button>
        <button class="btn" onclick="start('historia')" style="display: block; width: 80%; margin: 10px auto;">⚔️ HISTORIA</button>
        <button class="btn" onclick="start('geografia')" style="display: block; width: 80%; margin: 10px auto;">🌍 GEOGRAFÍA</button>
        <button class="btn" onclick="start('ingles')" style="display: block; width: 80%; margin: 10px auto;">🇬 INGLÉS</button>
        <button class="btn" onclick="start('dragonball')" style="display: block; width: 80%; margin: 10px auto;">🐉 DRAGON BALL Z</button>
        <button class="btn" onclick="start('pokemon')" style="display: block; width: 80%; margin: 10px auto;">⚡ POKEMON</button>
    </div>
</div>

<!-- GAME -->
<div id="game-screen" class="hidden">
    <div style="margin-bottom: 20px;">
        <button class="btn" onclick="showScoreboard()">📊 TABLERO</button>
        <button class="btn" onclick="goBack()">⬅️ MENU</button>
    </div>
    <div style="margin: 20px 0;">
        <div class="stat-box">PUNTOS: <span id="h">0</span></div>
        <div class="stat-box">PISO: <span id="f-num">1</span></div>
    </div>
    <div class="pixel-border" style="margin: 20px auto;">
        <div id="q-text" style="font-size: 10px; line-height: 1.8; min-height: 60px;"></div>
    </div>
    <div id="options-grid"></div>
</div>

<!-- MODAL -->
<div id="modal">
    <div class="modal-content">
        <div id="m-icon" style="font-size: 48px; margin-bottom: 20px;"></div>
        <div id="m-title" style="font-size: 12px; margin-bottom: 15px; color: #facc15;"></div>
        <div id="m-desc" style="font-size: 8px; color: #94a3b8; margin-bottom: 30px; line-height: 1.6;"></div>
        <button class="btn" onclick="closeModal()" style="background: #fff; color: #000;">CONTINUAR</button>
    </div>
</div>

<!-- SCOREBOARD MODAL -->
<div id="scoreboard-modal" style="position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 1000;">
    <div class="modal-content" style="max-width: 500px; max-height: 80vh; overflow-y: auto;">
        <h3 style="color: #facc15; font-size: 10px; margin-bottom: 20px;">📊 TABLERO</h3>
        <div id="score-content"></div>
        <button class="btn" onclick="closeScoreboard()" style="background: #fff; color: #000; margin-top: 20px;">CERRAR</button>
    </div>
</div>

<script>
// === BASE DE DATOS ===
const database = {
    matematicas: [
        { q: "Si 3 cuadernos cuestan $45, ¿cuánto pagarás por 12?", a: ["$135", "$180", "$150", "$200"], c: 1, p: "12 es el cuádruple de 3 (45 x 4)." },
        { q: "Resultado de (10 + 5) * 2 - 10:", a: ["20", "15", "25", "30"], c: 0, p: "Primero el paréntesis (15), luego x2 (30) y resta 10." },
        { q: "¿Qué número sigue: 2, 6, 18, 54, __?", a: ["108", "162", "150", "200"], c: 1, p: "Cada número se multiplica por 3." }
    ],
    espanol: [
        { q: "Las palabras que llevan el acento en la última sílaba se llaman:", a: ["Graves", "Esdrújulas", "Agudas", "Sobresdrújulas"], c: 2, p: "Ejemplo: Corazón, Café, Pared." },
        { q: "¿Cuál de estas palabras es esdrújula?", a: ["Cámara", "Balón", "Silla", "Cantar"], c: 0, p: "Las esdrújulas siempre se acentúan en la antepenúltima sílaba." },
        { q: "Palabra que indica una acción (Ej: Saltar):", a: ["Sustantivo", "Verbo", "Adjetivo", "Preposición"], c: 1, p: "Los verbos son acciones." }
    ],
    historia: [
        { q: "Primer presidente de México:", a: ["Juárez", "Guadalupe Victoria", "Hidalgo", "Madero"], c: 1, p: "Guadalupe Victoria (1824-1829)." },
        { q: "¿En qué año inició la Revolución Mexicana?", a: ["1810", "1910", "1917", "1821"], c: 1, p: "Fue en el siglo XX, exactamente 100 años después de la Independencia." },
        { q: "Civilización que construyó Chichén Itzá:", a: ["Azteca", "Inca", "Maya", "Olmeca"], c: 2, p: "Esta cultura se desarrolló en la península de Yucatán." }
    ],
    geografia: [
        { q: "¿Cuál es el país más grande del mundo?", a: ["China", "USA", "Rusia", "Canadá"], c: 2, p: "Está ubicado entre Europa y Asia." },
        { q: "¿Cuál es el río más largo del mundo?", a: ["Nilo", "Amazonas", "Misisipi", "Yangtsé"], c: 1, p: "Se encuentra en el continente sudamericano." },
        { q: "Capital de Francia:", a: ["Londres", "Berlín", "Madrid", "París"], c: 3, p: "Es conocida como la ciudad del amor y tiene una torre famosa." }
    ],
    ingles: [
        { q: "Choose the correct: She ___ my best friend.", a: ["am", "is", "are", "be"], c: 1, p: "Con 'She, He, It' usamos 'is'." },
        { q: "Meaning of 'They':", a: ["Nosotros", "Ustedes", "Ellos/Ellas", "Él"], c: 2, p: "They se refiere a otras personas." },
        { q: "Translate: 'Ventana'", a: ["Door", "Wall", "Window", "Floor"], c: 2, p: "Window es ventana." }
    ],
    dragonball: [
        { q: "¿Quién mató a Freezer?", a: ["Goku", "Vegeta", "Trunks", "Gohan"], c: 2, p: "Trunks del futuro." },
        { q: "Planeta de Piccolo:", a: ["Vegueta", "Namekusei", "Tierra", "Kaio"], c: 1, p: "Namekusei." },
        { q: "¿Cuál es el nivel de poder de Goku al inicio de Z?", a: ["10", "100", "1000", "5"], c: 0, p: "Era un número muy bajo comparado con los Saiyajins." }
    ],
    pokemon: [
        { q: "¿Quién es el protagonista de la serie?", a: ["Gary", "Ash Ketchum", "Brock", "Misty"], c: 1, p: "Su nombre empieza con A y es de Pueblo Paleta." },
        { q: "¿Cuál es el Pokémon inicial de tipo fuego?", a: ["Squirtle", "Bulbasaur", "Charmander", "Pikachu"], c: 2, p: "Es un pequeño lagarto con llama en la cola." },
        { q: "¿Qué tipo de Pokémon es Pikachu?", a: ["Fuego", "Agua", "Eléctrico", "Psíquico"], c: 2, p: "Usa ataques de rayo y electricidad." }
    ]
};

// === VARIABLES GLOBALES ===
let player = "";
let currentS = "";
let f = 0;
let hits = 0;
let attemptsOnCurrent = 0;

// === INICIALIZACIÓN CORREGIDA - ESPERA AL DOM ===
window.onload = function() {
    try {
        player = localStorage.getItem('player') || "";
        console.log("Jugador cargado:", player);
        
        if(player && player.trim() !== "") {
            const loginScreen = document.getElementById('login-screen');
            const menuScreen = document.getElementById('menu-screen');
            const displayName = document.getElementById('display-name');
            
            if(loginScreen && menuScreen && displayName) {
                loginScreen.classList.add('hidden');
                menuScreen.classList.remove('hidden');
                displayName.innerText = player.toUpperCase();
                initializeScores();
            }
        } else {
            const loginScreen = document.getElementById('login-screen');
            const menuScreen = document.getElementById('menu-screen');
            
            if(loginScreen && menuScreen) {
                loginScreen.classList.remove('hidden');
                menuScreen.classList.add('hidden');
            }
        }
    } catch(e) {
        console.error("Error en inicialización:", e);
        const errorDisplay = document.getElementById('login-error');
        if(errorDisplay) {
            errorDisplay.innerText = "⚠️ Error: Activa localStorage";
        }
    }
};

// === REGISTRO DE JUGADOR ===
function savePlayer() {
    const nameInput = document.getElementById('player-name');
    const errorDisplay = document.getElementById('login-error');
    const name = nameInput ? nameInput.value.trim() : "";
    
    if(!name || name.length < 2) {
        if(errorDisplay) {
            errorDisplay.innerText = "⚠️ Ingresa un nombre (mínimo 2 letras)";
            errorDisplay.style.color = "#ef4444";
        }
        return;
    }
    
    if(name.length > 15) {
        if(errorDisplay) {
            errorDisplay.innerText = "⚠️ Máximo 15 caracteres";
            errorDisplay.style.color = "#ef4444";
        }
        return;
    }
    
    try {
        localStorage.setItem('player', name);
        player = name;
        
        if(errorDisplay) {
            errorDisplay.style.color = "#22c55e";
            errorDisplay.innerText = "✓ ¡Registrado! Cargando...";
        }
        
        initializeScores();
        
        setTimeout(() => {
            const loginScreen = document.getElementById('login-screen');
            const menuScreen = document.getElementById('menu-screen');
            const displayName = document.getElementById('display-name');
            
            if(loginScreen && menuScreen && displayName) {
                loginScreen.classList.add('hidden');
                menuScreen.classList.remove('hidden');
                displayName.innerText = player.toUpperCase();
            }
            if(errorDisplay) {
                errorDisplay.innerText = "";
            }
            if(nameInput) {
                nameInput.value = "";
            }
        }, 500);
        
    } catch(e) {
        console.error("Error guardando jugador:", e);
        if(errorDisplay) {
            errorDisplay.innerText = "⚠️ Error: No se pudo guardar";
            errorDisplay.style.color = "#ef4444";
        }
    }
}

// === INICIALIZAR SCORES ===
function initializeScores() {
    try {
        const defaultScores = {
            matematicas: { points: 0, correct: 0, incorrect: 0 },
            espanol: { points: 0, correct: 0, incorrect: 0 },
            historia: { points: 0, correct: 0, incorrect: 0 },
            geografia: { points: 0, correct: 0, incorrect: 0 },
            ingles: { points: 0, correct: 0, incorrect: 0 },
            dragonball: { points: 0, correct: 0, incorrect: 0 },
            pokemon: { points: 0, correct: 0, incorrect: 0 }
        };
        
        const saved = localStorage.getItem(`scores_${player}`);
        if(!saved) {
            localStorage.setItem(`scores_${player}`, JSON.stringify(defaultScores));
        }
    } catch(e) {
        console.error("Error inicializando scores:", e);
    }
}

// === CERRAR SESIÓN ===
function logout() {
    try {
        localStorage.removeItem('player');
        player = "";
        location.reload();
    } catch(e) {
        const menuScreen = document.getElementById('menu-screen');
        const loginScreen = document.getElementById('login-screen');
        const nameInput = document.getElementById('player-name');
        
        if(menuScreen) menuScreen.classList.add('hidden');
        if(loginScreen) loginScreen.classList.remove('hidden');
        if(nameInput) nameInput.value = "";
    }
}

// === INICIAR JUEGO ===
function start(subject) {
    currentS = subject;
    f = 0; 
    hits = 0;
    attemptsOnCurrent = 0;
    const menuScreen = document.getElementById('menu-screen');
    const gameScreen = document.getElementById('game-screen');
    
    if(menuScreen) menuScreen.classList.add('hidden');
    if(gameScreen) gameScreen.classList.remove('hidden');
    render();
}

// === RENDERIZAR PREGUNTA ===
function render() {
    const qs = database[currentS];
    if (!qs) {
        alert("Error: Materia no encontrada");
        goBack();
        return;
    }
    if (f >= qs.length) {
        showM("👑", "¡COMPLETADO!", `Obtuviste ${hits}/${qs.length} aciertos`);
        saveScore(hits, qs.length - hits);
        setTimeout(() => { goBack(); }, 2000);
        return;
    }
    const fNum = document.getElementById('f-num');
    const h = document.getElementById('h');
    const qText = document.getElementById('q-text');
    
    if(fNum) fNum.innerText = f + 1;
    if(h) h.innerText = hits;
    if(qText) qText.innerText = qs[f].q;
    
    const grid = document.getElementById('options-grid');
    if(grid) {
        grid.innerHTML = '';
        qs[f].a.forEach((txt, i) => {
            const b = document.createElement('button');
            b.className = 'option-btn';
            b.innerText = txt;
            b.onclick = () => check(i, b);
            grid.appendChild(b);
        });
    }
}

// === VERIFICAR RESPUESTA ===
function check(selectedIndex, buttonElement) {
    const qd = database[currentS][f];
    const buttons = document.querySelectorAll('.option-btn');
    buttons.forEach(btn => btn.disabled = true);
    
    if (selectedIndex === qd.c) {
        buttonElement.classList.add('correct');
        hits++;
        f++;
        attemptsOnCurrent = 0;
        showM("💎", "¡CORRECTO!", "+10 puntos - ¡Siguiente pregunta!");
        setTimeout(() => {
            closeModal();
            render();
        }, 1500);
    } else {
        buttonElement.classList.add('wrong');
        attemptsOnCurrent++;
        let hintMessage = `💡 PISTA: ${qd.p}`;
        if (attemptsOnCurrent >= 2) {
            hintMessage += "\n\n¡Tómate tu tiempo y piensa bien!";
        }
        showM("❌", "INTENTA DE NUEVO", hintMessage);
        setTimeout(() => {
            closeModal();
            buttons.forEach(btn => {
                btn.disabled = false;
                btn.classList.remove('wrong');
            });
        }, 2000);
    }
    const h = document.getElementById('h');
    if(h) h.innerText = hits;
}

// === GUARDAR PUNTAJE ===
function saveScore(correct, incorrect) {
    try {
        const scores = getScores();
        if(scores[currentS]) {
            scores[currentS].points += (correct * 10);
            scores[currentS].correct += correct;
            scores[currentS].incorrect += incorrect;
            localStorage.setItem(`scores_${player}`, JSON.stringify(scores));
        }
    } catch(e) {
        console.error("Error guardando score:", e);
    }
}

// === MOSTRAR MODAL ===
function showM(icon, title, desc) {
    const mIcon = document.getElementById('m-icon');
    const mTitle = document.getElementById('m-title');
    const mDesc = document.getElementById('m-desc');
    const modal = document.getElementById('modal');
    
    if(mIcon) mIcon.innerText = icon;
    if(mTitle) mTitle.innerText = title;
    if(mDesc) mDesc.innerText = desc;
    if(modal) modal.style.display = 'flex';
}

function closeModal() {
    const modal = document.getElementById('modal');
    if(modal) modal.style.display = 'none';
}

function goBack() {
    const gameScreen = document.getElementById('game-screen');
    const menuScreen = document.getElementById('menu-screen');
    
    if(gameScreen) gameScreen.classList.add('hidden');
    if(menuScreen) menuScreen.classList.remove('hidden');
}

// === TABLERO DE PUNTAJES ===
function showScoreboard() {
    const scores = getScores();
    let html = '';
    const subjectNames = {
        matematicas: "🧮 MATEMÁTICAS",
        espanol: "📚 ESPAÑOL",
        historia: "⚔️ HISTORIA",
        geografia: "🌍 GEOGRAFÍA",
        ingles: "🇬 INGLÉS",
        dragonball: "🐉 DRAGON BALL Z",
        pokemon: "⚡ POKEMON"
    };
    Object.keys(scores).forEach(subj => {
        const s = scores[subj];
        const name = subjectNames[subj] || subj.toUpperCase();
        html += `<div style="border: 2px solid #475569; padding: 10px; margin: 10px 0; font-size: 8px; text-align: left;">
            <strong style="color: #facc15;">${name}</strong><br>
            Puntos: ${s.points} | Correctas: ${s.correct} | Errores: ${s.incorrect}
            </div>`;
    });
    const scoreContent = document.getElementById('score-content');
    const scoreboardModal = document.getElementById('scoreboard-modal');
    
    if(scoreContent) scoreContent.innerHTML = html || '<p style="font-size: 8px;">Sin datos aún</p>';
    if(scoreboardModal) scoreboardModal.style.display = 'flex';
}

function closeScoreboard() {
    const scoreboardModal = document.getElementById('scoreboard-modal');
    if(scoreboardModal) scoreboardModal.style.display = 'none';
}

// === OBTENER PUNTAJES ===
function getScores() {
    try {
        const defaultScores = {
            matematicas: { points: 0, correct: 0, incorrect: 0 },
            espanol: { points: 0, correct: 0, incorrect: 0 },
            historia: { points: 0, correct: 0, incorrect: 0 },
            geografia: { points: 0, correct: 0, incorrect: 0 },
            ingles: { points: 0, correct: 0, incorrect: 0 },
            dragonball: { points: 0, correct: 0, incorrect: 0 },
            pokemon: { points: 0, correct: 0, incorrect: 0 }
        };
        const saved = localStorage.getItem(`scores_${player}`);
        if (saved) {
            const parsed = JSON.parse(saved);
            return { ...defaultScores, ...parsed };
        }
        return defaultScores;
    } catch(e) {
        console.error("Error obteniendo scores:", e);
        return {
            matematicas: { points: 0, correct: 0, incorrect: 0 },
            espanol: { points: 0, correct: 0, incorrect: 0 },
            historia: { points: 0, correct: 0, incorrect: 0 },
            geografia: { points: 0, correct: 0, incorrect: 0 },
            ingles: { points: 0, correct: 0, incorrect: 0 },
            dragonball: { points: 0, correct: 0, incorrect: 0 },
            pokemon: { points: 0, correct: 0, incorrect: 0 }
        };
    }
}
</script>
</body>
</html>
