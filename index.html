<script>
const database = {
    matematicas: [
        { q: "Si 3 cuadernos cuestan $45, ¿cuánto pagarás por 12?", a: ["$135", "$180", "$150", "$200"], c: 1, p: "12 es el cuádruple de 3 (45 x 4)." },
        { q: "Resultado de (10 + 5) * 2 - 10:", a: ["20", "15", "25", "30"], c: 0, p: "Primero el paréntesis (15), luego x2 (30) y resta 10." },
        { q: "¿Qué número sigue: 2, 6, 18, 54, __?", a: ["108", "162", "150", "200"], c: 1, p: "Cada número se multiplica por 3." }
    ],
    espanol: [
        { q: "Las palabras que llevan el acento en la última sílaba se llaman:", a: ["Graves", "Esdrújulas", "Agudas", "Sobresdrújulas"], c: 2, p: "Ejemplo: Corazón, Café, Pared." },
        { q: "¿Cuál de estas palabras es esdrújula?", a: ["Cámara", "Balón", "Silla", "Cantar"], c: 0, p: "Las esdrújulas siempre se acentúan en la antepenúltima sílaba." },
        { q: "Palabra que indica una acción (Ej: Saltar):", a: ["Sustantivo", "Verbo", "Adjetivo", "Preposición"], c: 1, p: "Los verbos son acciones." }
    ],
    historia: [
        { q: "Primer presidente de México:", a: ["Juárez", "Guadalupe Victoria", "Hidalgo", "Madero"], c: 1, p: "Guadalupe Victoria (1824-1829)." },
        { q: "¿En qué año inició la Revolución Mexicana?", a: ["1810", "1910", "1917", "1821"], c: 1, p: "Fue en el siglo XX, exactamente 100 años después de la Independencia." },
        { q: "Civilización que construyó Chichén Itzá:", a: ["Azteca", "Inca", "Maya", "Olmeca"], c: 2, p: "Esta cultura se desarrolló en la península de Yucatán." }
    ],
    geografia: [
        { q: "¿Cuál es el país más grande del mundo?", a: ["China", "USA", "Rusia", "Canadá"], c: 2, p: "Está ubicado entre Europa y Asia." },
        { q: "¿Cuál es el río más largo del mundo?", a: ["Nilo", "Amazonas", "Misisipi", "Yangtsé"], c: 1, p: "Se encuentra en el continente sudamericano." },
        { q: "Capital de Francia:", a: ["Londres", "Berlín", "Madrid", "París"], c: 3, p: "Es conocida como la ciudad del amor y tiene una torre famosa." }
    ],
    ingles: [
        { q: "Choose the correct: She ___ my best friend.", a: ["am", "is", "are", "be"], c: 1, p: "Con 'She, He, It' usamos 'is'." },
        { q: "Meaning of 'They':", a: ["Nosotros", "Ustedes", "Ellos/Ellas", "Él"], c: 2, p: "They se refiere a otras personas." },
        { q: "Translate: 'Ventana'", a: ["Door", "Wall", "Window", "Floor"], c: 2, p: "Window es ventana." }
    ],
    dragonball: [
        { q: "¿Quién mató a Freezer?", a: ["Goku", "Vegeta", "Trunks", "Gohan"], c: 2, p: "Trunks del futuro." },
        { q: "Planeta de Piccolo:", a: ["Vegueta", "Namekusei", "Tierra", "Kaio"], c: 1, p: "Namekusei." },
        { q: "¿Cuál es el nivel de poder de Goku al inicio de Z?", a: ["10", "100", "1000", "5"], c: 0, p: "Era un número muy bajo comparado con los Saiyajins." }
    ],
    pokemon: [
        { q: "¿Quién es el protagonista de la serie?", a: ["Gary", "Ash Ketchum", "Brock", "Misty"], c: 1, p: "Su nombre empieza con A y es de Pueblo Paleta." },
        { q: "¿Cuál es el Pokémon inicial de tipo fuego?", a: ["Squirtle", "Bulbasaur", "Charmander", "Pikachu"], c: 2, p: "Es un pequeño lagarto con llama en la cola." },
        { q: "¿Qué tipo de Pokémon es Pikachu?", a: ["Fuego", "Agua", "Eléctrico", "Psíquico"], c: 2, p: "Usa ataques de rayo y electricidad." }
    ]
};

let player = localStorage.getItem('player') || "";
let currentS = "";
let f = 0;
let hits = 0;
let attemptsOnCurrent = 0;

// Inicialización al cargar
window.onload = function() {
    if(player && player.trim() !== "") {
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('menu-screen').classList.remove('hidden');
        document.getElementById('display-name').innerText = player.toUpperCase();
        initializeScores();
    }
};

function savePlayer() {
    const nameInput = document.getElementById('player-name');
    const name = nameInput.value.trim();
    const errorDisplay = document.getElementById('login-error');
    
    if(!name || name.length < 2) {
        if(errorDisplay) {
            errorDisplay.innerText = "⚠️ Ingresa un nombre (mínimo 2 letras)";
            errorDisplay.style.color = "#ef4444";
        }
        return;
    }
    
    if(name.length > 15) {
        if(errorDisplay) {
            errorDisplay.innerText = "⚠️ Máximo 15 caracteres";
            errorDisplay.style.color = "#ef4444";
        }
        return;
    }
    
    try {
        localStorage.setItem('player', name);
        player = name;
        
        if(errorDisplay) {
            errorDisplay.style.color = "#22c55e";
            errorDisplay.innerText = "✓ ¡Registrado!";
        }
        
        initializeScores();
        
        setTimeout(() => {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('menu-screen').classList.remove('hidden');
            document.getElementById('display-name').innerText = player.toUpperCase();
            if(errorDisplay) errorDisplay.innerText = "";
            nameInput.value = "";
        }, 800);
        
    } catch(e) {
        console.error("Error:", e);
        if(errorDisplay) {
            errorDisplay.innerText = "⚠️ Error al guardar";
            errorDisplay.style.color = "#ef4444";
        }
    }
}

function initializeScores() {
    const defaultScores = {
        matematicas: { points: 0, correct: 0, incorrect: 0 },
        espanol: { points: 0, correct: 0, incorrect: 0 },
        historia: { points: 0, correct: 0, incorrect: 0 },
        geografia: { points: 0, correct: 0, incorrect: 0 },
        ingles: { points: 0, correct: 0, incorrect: 0 },
        dragonball: { points: 0, correct: 0, incorrect: 0 },
        pokemon: { points: 0, correct: 0, incorrect: 0 }
    };
    
    const saved = localStorage.getItem(`scores_${player}`);
    if(!saved) {
        localStorage.setItem(`scores_${player}`, JSON.stringify(defaultScores));
    }
}

function logout() {
    localStorage.removeItem('player');
    player = "";
    location.reload();
}

function start(subject) {
    currentS = subject;
    f = 0; 
    hits = 0;
    attemptsOnCurrent = 0;
    document.getElementById('menu-screen').classList.add('hidden');
    document.getElementById('game-screen').classList.remove('hidden');
    render();
}

function render() {
    const qs = database[currentS];
    if (!qs) {
        alert("Error: Materia no encontrada");
        goBack();
        return;
    }
    if (f >= qs.length) {
        showM("👑", "¡COMPLETADO!", `Obtuviste ${hits}/${qs.length} aciertos`);
        saveScore(hits, qs.length - hits);
        setTimeout(() => { goBack(); }, 2000);
        return;
    }
    document.getElementById('f-num').innerText = f + 1;
    document.getElementById('h').innerText = hits;
    document.getElementById('q-text').innerText = qs[f].q;
    const grid = document.getElementById('options-grid');
    grid.innerHTML = '';
    qs[f].a.forEach((txt, i) => {
        const b = document.createElement('button');
        b.className = 'option-btn';
        b.innerText = txt;
        b.onclick = () => check(i, b);
        grid.appendChild(b);
    });
}

function check(selectedIndex, buttonElement) {
    const qd = database[currentS][f];
    const buttons = document.querySelectorAll('.option-btn');
    buttons.forEach(btn => btn.disabled = true);
    
    if (selectedIndex === qd.c) {
        buttonElement.classList.add('correct');
        hits++;
        f++;
        attemptsOnCurrent = 0;
        showM("💎", "¡CORRECTO!", "+10 puntos");
        setTimeout(() => {
            closeModal();
            render();
        }, 1500);
    } else {
        buttonElement.classList.add('wrong');
        attemptsOnCurrent++;
        let hintMessage = `💡 PISTA: ${qd.p}`;
        if (attemptsOnCurrent >= 2) {
            hintMessage += "\n\n¡Tómate tu tiempo!";
        }
        showM("❌", "INTENTA DE NUEVO", hintMessage);
        setTimeout(() => {
            closeModal();
            buttons.forEach(btn => {
                btn.disabled = false;
                btn.classList.remove('wrong');
            });
        }, 2000);
    }
    document.getElementById('h').innerText = hits;
}

function saveScore(correct, incorrect) {
    const scores = getScores();
    if(scores[currentS]) {
        scores[currentS].points += (correct * 10);
        scores[currentS].correct += correct;
        scores[currentS].incorrect += incorrect;
        localStorage.setItem(`scores_${player}`, JSON.stringify(scores));
    }
}

function showM(icon, title, desc) {
    document.getElementById('m-icon').innerText = icon;
    document.getElementById('m-title').innerText = title;
    document.getElementById('m-desc').innerText = desc;
    document.getElementById('modal').style.display = 'flex';
}

function closeModal() {
    document.getElementById('modal').style.display = 'none';
}

function goBack() {
    document.getElementById('game-screen').classList.add('hidden');
    document.getElementById('menu-screen').classList.remove('hidden');
}

function showScoreboard() {
    const scores = getScores();
    let html = '';
    const subjectNames = {
        matematicas: "🧮 MATEMÁTICAS",
        espanol: "📚 ESPAÑOL",
        historia: "⚔️ HISTORIA",
        geografia: "🌍 GEOGRAFÍA",
        ingles: "🇬 INGLÉS",
        dragonball: "🐉 DRAGON BALL Z",
        pokemon: "⚡ POKEMON"
    };
    Object.keys(scores).forEach(subj => {
        const s = scores[subj];
        const name = subjectNames[subj] || subj.toUpperCase();
        html += `<div style="border: 2px solid #475569; padding: 10px; margin: 10px 0; font-size: 8px; text-align: left;">
            <strong style="color: #facc15;">${name}</strong><br>
            Puntos: ${s.points} | Correctas: ${s.correct} | Errores: ${s.incorrect}
            </div>`;
    });
    document.getElementById('score-content').innerHTML = html || '<p style="font-size: 8px;">Sin datos aún</p>';
    document.getElementById('scoreboard-modal').style.display = 'flex';
}

function closeScoreboard() {
    document.getElementById('scoreboard-modal').style.display = 'none';
}

function getScores() {
    const defaultScores = {
        matematicas: { points: 0, correct: 0, incorrect: 0 },
        espanol: { points: 0, correct: 0, incorrect: 0 },
        historia: { points: 0, correct: 0, incorrect: 0 },
        geografia: { points: 0, correct: 0, incorrect: 0 },
        ingles: { points: 0, correct: 0, incorrect: 0 },
        dragonball: { points: 0, correct: 0, incorrect: 0 },
        pokemon: { points: 0, correct: 0, incorrect: 0 }
    };
    const saved = localStorage.getItem(`scores_${player}`);
    if (saved) {
        try {
            const parsed = JSON.parse(saved);
            return { ...defaultScores, ...parsed };
        } catch(e) {
            return defaultScores;
        }
    }
    return defaultScores;
}
</script>
