<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mega Quest: Multiversos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        body { 
            font-family: 'Press Start 2P', cursive; 
            background-color: #0f172a; 
            color: #fff; 
            text-align: center; 
            margin: 0;
            padding: 20px;
        }

        .pixel-border { 
            border: 4px solid #fff; 
            box-shadow: 0 0 0 4px #000, 0 0 0 8px #fff; 
            background-color: #1e293b; 
            margin: 20px auto; 
            max-width: 600px;
            padding: 20px;
        }

        .btn { 
            background: #334155; 
            border: 4px solid #000; 
            color: white; 
            padding: 15px 20px; 
            margin: 10px;
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            cursor: pointer;
            display: inline-block;
        }

        .btn:hover { background: #475569; }
        
        .hidden { display: none !important; }
        
        input { 
            font-family: 'Press Start 2P', cursive;
            padding: 10px;
            margin: 10px;
            width: 80%;
            max-width: 300px;
        }

        .stat-box {
            display: inline-block;
            border: 3px solid #fff;
            padding: 10px 20px;
            margin: 5px;
            background: #000;
            font-size: 8px;
        }

        .option-btn {
            display: block;
            width: 100%;
            max-width: 500px;
            margin: 10px auto;
            padding: 15px;
            background: #1e293b;
            border: 3px solid #fff;
            color: white;
            font-family: 'Press Start 2P', cursive;
            font-size: 9px;
            cursor: pointer;
            text-align: left;
        }

        .option-btn:hover { background: #334155; }

        #modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            border: 4px solid #fff;
            box-shadow: 0 0 0 4px #000, 0 0 0 8px #fff;
            background: #1e293b;
            padding: 40px;
            max-width: 400px;
        }
    </style>
</head>
<body>

    <!-- LOGIN -->
    <div id="login-screen" class="pixel-border">
        <h1 style="color: #facc15; font-size: 12px; margin-bottom: 30px;">NUEVO JUGADOR</h1>
        <input type="text" id="player-name" placeholder="NOMBRE..." style="text-align: center;">
        <br>
        <button class="btn" onclick="savePlayer()">REGISTRARSE</button>
    </div>

    <!-- MENU -->
    <div id="menu-screen" class="hidden">
        <div style="margin-bottom: 20px;">
            <button class="btn" onclick="showScoreboard()">📊 TABLERO</button>
            <button class="btn" onclick="logout()">🔄 CAMBIAR JUGADOR</button>
        </div>
        <div style="font-size: 8px; color: #22d3ee; margin-bottom: 20px;">
            HOLA, <span id="display-name"></span>
        </div>
        
        <div class="pixel-border">
            <h2 style="color: #facc15; font-size: 10px; margin-bottom: 20px;">ELIGE TU AVENTURA</h2>
            <button class="btn" onclick="start('matematicas')" style="display: block; width: 80%; margin: 10px auto;">🧮 MATEMÁTICAS</button>
            <button class="btn" onclick="start('ingles')" style="display: block; width: 80%; margin: 10px auto;">🇬 INGLÉS</button>
            <button class="btn" onclick="start('dragonball')" style="display: block; width: 80%; margin: 10px auto;">🐉 DRAGON BALL Z</button>
            <button class="btn" onclick="start('historia')" style="display: block; width: 80%; margin: 10px auto;">⚔️ HISTORIA</button>
        </div>
    </div>

    <!-- GAME -->
    <div id="game-screen" class="hidden">
        <div style="margin-bottom: 20px;">
            <button class="btn" onclick="showScoreboard()">📊 TABLERO</button>
            <button class="btn" onclick="goBack()">⬅️ MENU</button>
        </div>
        
        <div style="margin: 20px 0;">
            <div class="stat-box">PUNTOS: <span id="h">0</span></div>
            <div class="stat-box">PISO: <span id="f-num">1</span></div>
        </div>

        <div class="pixel-border" style="margin: 20px auto;">
            <div id="q-text" style="font-size: 10px; line-height: 1.8; min-height: 60px;"></div>
        </div>

        <div id="options-grid"></div>
    </div>

    <!-- MODAL -->
    <div id="modal">
        <div class="modal-content">
            <div id="m-icon" style="font-size: 48px; margin-bottom: 20px;"></div>
            <div id="m-title" style="font-size: 12px; margin-bottom: 15px; color: #facc15;"></div>
            <div id="m-desc" style="font-size: 8px; color: #94a3b8; margin-bottom: 30px; line-height: 1.6;"></div>
            <button class="btn" onclick="closeModal()" style="background: #fff; color: #000;">CONTINUAR</button>
        </div>
    </div>

    <!-- SCOREBOARD MODAL -->
    <div id="scoreboard-modal" style="position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 1000;">
        <div class="modal-content" style="max-width: 500px; max-height: 80vh; overflow-y: auto;">
            <h3 style="color: #facc15; font-size: 10px; margin-bottom: 20px;">📊 TABLERO</h3>
            <div id="score-content"></div>
            <button class="btn" onclick="closeScoreboard()" style="background: #fff; color: #000; margin-top: 20px;">CERRAR</button>
        </div>
    </div>

    <script>
        const database = {
           // --- BLOQUE 1: ARITMÉTICA Y OPERACIONES (PISOS 1-30) ---
    { q: "Si 3 cuadernos cuestan $45, ¿cuánto pagarás por 12?", a: ["$135", "$180", "$150", "$200"], c: 1, p: "12 es el cuádruple de 3 (45 x 4)." },
    { q: "Resultado de (10 + 5) * 2 - 10:", a: ["20", "15", "25", "30"], c: 0, p: "Primero el paréntesis (15), luego x2 (30) y resta 10." },
    { q: "¿Qué número sigue: 2, 6, 18, 54, __?", a: ["108", "162", "150", "200"], c: 1, p: "Cada número se multiplica por 3." },
    { q: "Si X + 15 = 40, ¿cuánto vale X?", a: ["20", "30", "25", "35"], c: 2, p: "Resta 40 - 15." },
    { q: "Un pantalón de $500 tiene 20% de descuento. ¿Cuánto cuesta?", a: ["$400", "$450", "$100", "$380"], c: 0, p: "El 20% son $100. Resta 500 - 100." },
    { q: "¿Cuál es el resultado de 1/2 + 1/4?", a: ["2/6", "3/4", "1/4", "1/2"], c: 1, p: "1/2 es lo mismo que 2/4. Suma 2/4 + 1/4." },
    { q: "¿Cuántos minutos hay en 3 horas y media?", a: ["180 min", "200 min", "210 min", "240 min"], c: 2, p: "60 x 3 = 180. Suma 30 más." },
    { q: "Si multiplicas un número por 0, el resultado es siempre:", a: ["El mismo número", "1", "0", "Infinito"], c: 2, p: "Regla de oro: todo por cero es cero." },
    { q: "¿Cuál es la raíz cuadrada de 64?", a: ["6", "7", "8", "9"], c: 2, p: "8 x 8 = 64." },
    { q: "Si 5 entradas al cine cuestan $400, ¿cuánto cuesta 1?", a: ["$70", "$80", "$90", "$75"], c: 1, p: "Divide 400 entre 5." },
    { q: "Resultado de 2 + 3 * 4:", a: ["20", "14", "11", "12"], c: 1, p: "Jerarquía: Primero la multiplicación (12) y luego suma 2." },
    { q: "¿Cuántos segundos hay en 2 minutos?", a: ["100", "120", "150", "60"], c: 1, p: "60 + 60." },
    { q: "Si tienes -5 pesos y te dan 10, ¿cuánto tienes?", a: ["-15", "15", "5", "0"], c: 2, p: "10 positivo menos 5 que debías." },
    { q: "¿Cuál es el sucesor de -1?", a: ["-2", "0", "1", "-0.5"], c: 1, p: "A la derecha del -1 en la recta está el 0." },

    { q: "Si 1/3 de un número es 9, ¿cuál es el número?", a: ["3", "18", "27", "21"], c: 2, p: "9 x 3 = 27." },

    { q: "¿Cuál es el triple de 20 menos 10?", a: ["50", "30", "60", "40"], c: 0, p: "Triple de 20 es 60. Resta 10." },
    { q: "Si repartes 100 dulces entre 4 niños, ¿cuántos le tocan a cada uno?", a: ["20", "25", "30", "15"], c: 1, p: "La cuarta parte de 100." },

    // --- BLOQUE 2: GEOMETRÍA Y MEDIDAS (PISOS 21-50) ---
    { q: "¿Cuántos grados mide un ángulo recto?", a: ["45°", "90°", "180°", "360°"], c: 1, p: "Es el ángulo en forma de 'L'." },

    { q: "Un triángulo con todos sus lados iguales se llama:", a: ["Isósceles", "Escaleno", "Equilátero", "Rectángulo"], c: 2, p: "Equi = igual. Látero = lado." },

    // --- BLOQUE 3: LÓGICA Y RAZONAMIENTO (PISOS 51-100) ---
    { q: "Si un tren eléctrico va al Norte, ¿hacia dónde sale el humo?", a: ["Sur", "Norte", "Ningún lado", "Este"], c: 2, p: "¡Es un tren eléctrico!" },

    { q: "Si el papá de Mike tiene 4 hijos: Pepe, Popo, Pupu y...", a: ["Papa", "Pipi", "Mike", "Pupo"], c: 2, p: "El nombre está al principio de la pregunta." },
    { q: "Un caracol sube 3m de día y resbala 2m de noche. El pozo mide 10m. ¿En qué día sale?", a: ["10", "8", "7", "9"], c: 1, p: "Ojo: el día que llega al borde ya no resbala." },
    { q: "Si hoy es martes, ¿qué día será dentro de 8 días?", a: ["Martes", "Miércoles", "Jueves", "Lunes"], c: 1, p: "7 días es martes otra vez, +1 es miércoles." },

    { q: "Si una pizza tiene 8 rebanadas y te comes 1/4, ¿cuántas quedan?", a: ["4", "6", "2", "7"], c: 1, p: "1/4 de 8 es 2. Resta 8 - 2." },
    { q: "En una carrera adelantas al que va en SEGUNDO lugar. ¿En qué lugar estás?", a: ["Primero", "Segundo", "Tercero", "Cuarto"], c: 1, p: "Ocupas el lugar del que acabas de rebasar." },
    { q: "¿Cuál es el número que sigue: 1, 1, 2, 3, 5, 8, __?", a: ["10", "12", "13", "15"], c: 2, p: "Suma los dos anteriores (Serie Fibonacci)." },

    { q: "¿Qué tiene manos pero no puede aplaudir?", a: ["Un mono", "Un reloj", "Un guante", "Una estatua"], c: 1, p: "Las manecillas del reloj." },
    { q: "Si un ladrillo pesa 1kg más medio ladrillo, ¿cuánto pesa el ladrillo?", a: ["1.5kg", "2kg", "3kg", "1kg"], c: 1, p: "Si la mitad pesa 1kg, el total es el doble." },
    { q: "¿Cuántas veces puedes restar 1 al número 10?", a: ["10 veces", "1 vez", "Infinitas", "0"], c: 1, p: "Después de la primera vez, ya no restas a '10'." },
    { q: "Si hay 3 manzanas y quitas 2, ¿cuántas te quedan?", a: ["1", "2", "3", "0"], c: 1, p: "Las que tú quitaste son las que te quedan." },

    { q: "¿Qué número falta: 100, 90, 80, __, 60?", a: ["75", "70", "65", "50"], c: 1, p: "Resta 10 cada vez." },
    { q: "Un ángulo obtuso es mayor a:", a: ["45°", "180°", "90°", "360°"], c: 2, p: "Es más abierto que el recto." },
    { q: "Si 1 kilo de tortillas cuesta $22, ¿cuánto cuestan 5 kilos?", a: ["$100", "$110", "$120", "$105"], c: 1, p: "22 x 5." },

    // --- BLOQUE 4: REFUERZO MATEMÁTICO (PISOS 101-150) ---

        let player = localStorage.getItem('player') || "";
        let currentS = "";
        let f = 0;
        let hits = 0;

        function savePlayer() {
            const name = document.getElementById('player-name').value.trim();
            if(name) {
                localStorage.setItem('player', name);
                location.reload();
            }
        }

        function logout() {
            localStorage.removeItem('player');
            location.reload();
        }

        function start(subject) {
            currentS = subject;
            f = 0; hits = 0;
            document.getElementById('menu-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            render();
        }

        function render() {
            const qs = database[currentS];
            if (f >= qs.length) {
                showM("👑", "¡COMPLETADO!", `Obtuviste ${hits}/${qs.length} aciertos`);
                setTimeout(() => { goBack(); }, 2000);
                return;
            }

            document.getElementById('f-num').innerText = f + 1;
            document.getElementById('h').innerText = hits;
            document.getElementById('q-text').innerText = qs[f].q;
            
            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';
            qs[f].a.forEach((txt, i) => {
                const b = document.createElement('button');
                b.className = 'option-btn';
                b.innerText = txt;
                b.onclick = () => check(i);
                grid.appendChild(b);
            });
        }

        function check(i) {
            const qd = database[currentS][f];
            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach(btn => btn.disabled = true);

            if (i === qd.c) {
                hits++;
                f++;
                showM("💎", "¡CORRECTO!", "+10 puntos");
                setTimeout(() => {
                    closeModal();
                    render();
                }, 1500);
            } else {
                f++;
                showM("💥", "INCORRECTO", `PISTA: ${qd.p}`);
                setTimeout(() => {
                    closeModal();
                    render();
                }, 2000);
            }
            document.getElementById('h').innerText = hits;
        }

        function showM(icon, title, desc) {
            document.getElementById('m-icon').innerText = icon;
            document.getElementById('m-title').innerText = title;
            document.getElementById('m-desc').innerText = desc;
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        function goBack() {
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('menu-screen').classList.remove('hidden');
        }

        function showScoreboard() {
            const scores = getScores();
            let html = '';
            Object.keys(scores).forEach(subj => {
                const s = scores[subj];
                html += `<div style="border: 2px solid #475569; padding: 10px; margin: 10px 0; font-size: 8px; text-align: left;">
                    <strong style="color: #facc15;">${subj.toUpperCase()}</strong><br>
                    Puntos: ${s.points} | Correctas: ${s.correct} | Errores: ${s.incorrect}
                </div>`;
            });
            document.getElementById('score-content').innerHTML = html || '<p style="font-size: 8px;">Sin datos aún</p>';
            document.getElementById('scoreboard-modal').style.display = 'flex';
        }

        function closeScoreboard() {
            document.getElementById('scoreboard-modal').style.display = 'none';
        }

        function getScores() {
            const saved = localStorage.getItem(`scores_${player}`);
            return saved ? JSON.parse(saved) : {
                matematicas: { points: 0, correct: 0, incorrect: 0 },
                ingles: { points: 0, correct: 0, incorrect: 0 },
                dragonball: { points: 0, correct: 0, incorrect: 0 },
                historia: { points: 0, correct: 0, incorrect: 0 }
            };
        }

        // Inicialización
        if(player) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('menu-screen').classList.remove('hidden');
            document.getElementById('display-name').innerText = player.toUpperCase();
        }
    </script>
