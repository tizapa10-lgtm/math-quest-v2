<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math Quest: V3 Ultra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        :root { --bg: #0f172a; --panel: #1e293b; --gold: #facc15; }
        body { font-family: 'Press Start 2P', cursive; background-color: var(--bg); color: #fff; text-align: center; }
        .pixel-border { border: 4px solid #fff; box-shadow: 0 0 0 4px #000, 0 0 0 8px #fff; background-color: var(--panel); margin-bottom: 20px; }
        .btn-answer { background: #334155; border: 4px solid #000; box-shadow: inset -4px -4px 0 #1e293b, inset 4px 4px 0 #475569; font-size: 9px; padding: 18px; width: 100%; text-align: left; margin-bottom: 12px; color: white; }
        .btn-answer:active { transform: translateY(2px); }
        #modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; display: none; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body class="p-4 flex flex-col items-center">

    <div class="w-full max-w-md grid grid-cols-3 gap-2 mb-6 text-[10px]">
        <div class="p-2 border-4 border-gray-700 bg-black">✅ <span id="h">0</span></div>
        <div class="p-2 border-4 border-gray-700 bg-black">❌ <span id="m">0</span></div>
        <div class="p-2 border-4 border-yellow-700 bg-black text-yellow-400">⭐ <span id="g">0.0</span></div>
    </div>

    <div class="w-full max-w-md p-4 pixel-border">
        <div class="text-cyan-400 text-[10px]">PISO <span id="floor-num">1</span></div>
        <div class="text-[40px] my-4">👾</div>
        <div id="question" class="text-[9px] text-green-300 leading-relaxed px-2"></div>
    </div>

    <div id="options" class="w-full max-w-md"></div>

    <button onclick="localStorage.clear(); location.reload();" class="mt-10 text-[7px] text-gray-600 underline">REINICIAR TODO</button>

    <div id="modal">
        <div class="pixel-border p-8 w-full max-w-xs" style="border-color: var(--gold)">
            <div id="m-icon" class="text-5xl mb-4"></div>
            <div id="m-title" class="text-sm mb-4"></div>
            <div id="m-desc" class="text-[8px] text-gray-400 mb-8 leading-loose"></div>
            <button onclick="location.reload()" class="btn-answer text-center" style="background:#fff; color:#000; text-align:center">CONTINUAR</button>
        </div>
    </div>

    <script>
        // PEGA AQUÍ TUS PREGUNTAS (HE PUESTO 5 DE EJEMPLO)
        const questions = [
            { q: "Si 3 cuadernos cuestan $45, ¿cuánto pagarás por 12?", a: ["$135", "$180", "$150", "$200"], c: 1, p: "45 x 4 = 180." },
            { q: "¿Quién es la persona que mas amas?", a: ["Mike", "Pápa", "Máma", "Hermana"], c: 1, p: "¡Pápa!" },
            { q: "¿Qué número sigue: 2, 6, 18, __?", a: ["24", "36", "54", "48"], c: 2, p: "Multiplica por 3." },
            { q: "Un pantalón de $400 con 25% desc. cuesta:", a: ["$300", "$100", "$350", "$375"], c: 0, p: "Resta $100." },
            { q: "Resultado de (8 + 2) * (10 - 4):", a: ["20", "60", "48", "100"], c: 1, p: "10 * 6 = 60." }
            // ... Agrega las demás siguiendo este formato
        ];

        // CARGAR DATOS
        let f = parseInt(localStorage.getItem('floor')) || 0;
        let hits = parseInt(localStorage.getItem('hits')) || 0;
        let miss = parseInt(localStorage.getItem('miss')) || 0;

        // DIBUJAR PANTALLA
        function init() {
            if (f >= questions.length) {
                document.body.innerHTML = "<div class='mt-20 text-yellow-400'>🏆 ¡VICTORIA TOTAL!<br><br><button onclick='localStorage.clear(); location.reload();' class='btn-answer text-center'>REPETIR</button></div>";
                return;
            }

            document.getElementById('floor-num').innerText = f + 1;
            document.getElementById('h').innerText = hits;
            document.getElementById('m').innerText = miss;
            const total = hits + miss;
            document.getElementById('g').innerText = total > 0 ? ((hits/total)*10).toFixed(1) : "0.0";

            const qData = questions[f];
            document.getElementById('question').innerText = qData.q;
            
            const grid = document.getElementById('options');
            qData.a.forEach((txt, i) => {
                const b = document.createElement('button');
                b.className = "btn-answer";
                b.innerText = txt;
                b.onclick = () => {
                    if (i === qData.c) {
                        localStorage.setItem('hits', hits + 1);
                        localStorage.setItem('floor', f + 1);
                        showM("⚔️", "¡BIEN!", "Derrotaste al monstruo.");
                    } else {
                        localStorage.setItem('miss', miss + 1);
                        showM("💀", "¡OUCH!", "PISTA: " + qData.p);
                    }
                };
                grid.appendChild(b);
            });
        }

        function showM(i, t, d) {
            document.getElementById('m-icon').innerText = i;
            document.getElementById('m-title').innerText = t;
            document.getElementById('m-desc').innerText = d;
            document.getElementById('modal').style.display = 'flex';
        }

        init();
    </script>
</body>
</html>
