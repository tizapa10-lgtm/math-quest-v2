<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Multi-Quest 6to Grado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        :root { --bg: #0f172a; --panel: #1e293b; --gold: #facc15; }
        body { font-family: 'Press Start 2P', cursive; background-color: var(--bg); color: #fff; text-align: center; }
        .pixel-border { border: 4px solid #fff; box-shadow: 0 0 0 4px #000, 0 0 0 8px #fff; background-color: var(--panel); margin-bottom: 20px; }
        .btn-choice { background: #334155; border: 4px solid #000; box-shadow: inset -4px -4px 0 #1e293b, inset 4px 4px 0 #475569; font-size: 10px; padding: 20px; width: 100%; margin-bottom: 12px; color: white; cursor: pointer; }
        .btn-answer { background: #1e293b; border: 4px solid #fff; font-size: 9px; padding: 15px; width: 100%; margin-bottom: 10px; color: white; text-align: left; }
        #modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; display: none; align-items: center; justify-content: center; padding: 20px; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="p-4 flex flex-col items-center">

    <div id="menu-screen" class="w-full max-w-md">
        <div class="pixel-border p-6 mt-10">
            <h1 class="text-yellow-400 text-sm mb-8">ELIGE TU MISIÓN</h1>
            <button onclick="startSubject('matematicas')" class="btn-choice" style="border-color: #22d3ee;">🧮 MATEMÁTICAS</button>
            <button onclick="startSubject('espanol')" class="btn-choice" style="border-color: #f472b6;">📖 ESPAÑOL</button>
            <button onclick="startSubject('historia')" class="btn-choice" style="border-color: #fb923c;">⚔️ HISTORIA</button>
            <button onclick="startSubject('geografia')" class="btn-choice" style="border-color: #4ade80;">🌍 GEOGRAFÍA</button>
        </div>
    </div>

    <div id="game-screen" class="w-full max-w-md hidden">
        <div class="flex justify-between mb-4 text-[8px]">
            <button onclick="location.reload()" class="text-gray-400">⬅️ VOLVER</button>
            <span id="subject-name" class="text-yellow-400"></span>
        </div>
        
        <div class="grid grid-cols-2 gap-2 mb-6 text-[8px]">
            <div class="p-2 border-4 border-gray-700 bg-black">✅ <span id="h">0</span></div>
            <div class="p-2 border-4 border-gray-700 bg-black text-yellow-400">PISO <span id="floor-num">1</span></div>
        </div>

        <div class="p-4 pixel-border">
            <div id="question" class="text-[9px] text-green-300 leading-relaxed"></div>
        </div>

        <div id="options"></div>
    </div>

    <div id="modal">
        <div class="pixel-border p-8 w-full max-w-xs" style="border-color: var(--gold)">
            <div id="m-icon" class="text-5xl mb-4"></div>
            <div id="m-title" class="text-sm mb-4"></div>
            <div id="m-desc" class="text-[8px] text-gray-400 mb-8 leading-loose"></div>
            <button onclick="closeModal()" class="btn-choice" style="background:#fff; color:#000;">CONTINUAR</button>
        </div>
    </div>

    <script>
        const database = {
            matematicas: [
                { q: "¿Cuál es el resultado de 3/4 + 1/8?", a: ["4/12", "7/8", "1/2", "5/8"], c: 1, p: "Convierte 3/4 a 6/8 y suma." },
                { q: "Si un círculo tiene 10cm de diámetro, ¿su radio es?", a: ["20cm", "5cm", "10cm", "2.5cm"], c: 1, p: "El radio es la mitad del diámetro." },
                { q: "Resultado de: 5 + 5 x 5", a: ["50", "25", "30", "15"], c: 2, p: "Primero multiplica (5x5=25) y suma 5." }
            ],
            espanol: [
                { q: "¿Qué tipo de palabra es 'correr'?", a: ["Sustantivo", "Adjetivo", "Verbo", "Adverbio"], c: 2, p: "Indica una acción." },
                { q: "Parte del cuento donde se resuelve el conflicto:", a: ["Inicio", "Desarrollo", "Desenlace", "Título"], c: 2, p: "Es el final de la historia." },
                { q: "Palabra que tiene la sílaba tónica en la última sílaba:", a: ["Aguda", "Grave", "Esdrújula", "Sobresdrújula"], c: 0, p: "Ejemplo: Melón, Correr, Sofá." }
            ],
            historia: [
                { q: "Civilización que construyó las pirámides del Sol y la Luna:", a: ["Maya", "Mexica", "Teotihuacana", "Olmeca"], c: 2, p: "Se ubicaron en el Estado de México." },
                { q: "Periodo que inició con la agricultura y el sedentarismo:", a: ["Paleolítico", "Neolítico", "Edad de Oro", "Virreinato"], c: 1, p: "Neo significa nuevo (piedra nueva)." },
                { q: "¿En qué año se descubrió América?", a: ["1521", "1810", "1492", "1910"], c: 2, p: "Siglo XV, viaje de Cristóbal Colón." }
            ],
            geografia: [
                { q: "Capa de la Tierra donde vivimos:", a: ["Núcleo", "Manto", "Corteza", "Atmósfera"], c: 2, p: "Es la capa más externa y sólida." },
                { q: "Continente con mayor número de habitantes:", a: ["América", "África", "Asia", "Europa"], c: 2, p: "Países como China e India están ahí." },
                { q: "Línea imaginaria que divide la Tierra en Norte y Sur:", a: ["Meridiano", "Ecuador", "Trópico", "Polo"], c: 1, p: "Es el cinturón de la Tierra." }
            ]
        };

        let currentSubject = '';
        let f = 0;
        let hits = 0;

        function startSubject(subject) {
            currentSubject = subject;
            f = 0;
            hits = 0;
            document.getElementById('menu-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            document.getElementById('subject-name').innerText = subject.toUpperCase();
            render();
        }

        function render() {
            const questions = database[currentSubject];
            if (f >= questions.length) {
                showM("🏆", "¡MISIÓN CUMPLIDA!", "Completaste " + currentSubject);
                window.shouldReset = true;
                return;
            }

            document.getElementById('floor-num').innerText = f + 1;
            document.getElementById('h').innerText = hits;

            const qData = questions[f];
            document.getElementById('question').innerText = qData.q;
            
            const grid = document.getElementById('options');
            grid.innerHTML = '';
            qData.a.forEach((txt, i) => {
                const b = document.createElement('button');
                b.className = "btn-answer";
                b.innerText = txt;
                b.onclick = () => {
                    if (i === qData.c) {
                        hits++; f++;
                        showM("⚔️", "¡CORRECTO!", "¡Buen trabajo!");
                    } else {
                        showM("💀", "ERROR", "PISTA: " + qData.p);
                    }
                };
                grid.appendChild(b);
            });
        }

        function showM(i, t, d) {
            document.getElementById('m-icon').innerText = i;
            document.getElementById('m-title').innerText = t;
            document.getElementById('m-desc').innerText = d;
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            if (window.shouldReset) {
                window.shouldReset = false;
                location.reload();
            } else {
                render();
            }
        }
    </script>
</body>
</html>
