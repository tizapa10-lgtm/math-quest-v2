<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mega Quest: Multiversos</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
body {
    font-family: 'Press Start 2P', cursive;
    background-color: #0f172a;
    color: #fff;
    text-align: center;
    margin: 0;
    padding: 20px;
}
.pixel-border {
    border: 4px solid #fff;
    box-shadow: 0 0 0 4px #000, 0 0 0 8px #fff;
    background-color: #1e293b;
    margin: 20px auto;
    max-width: 600px;
    padding: 20px;
}
.btn {
    background: #334155;
    border: 4px solid #000;
    color: white;
    padding: 15px 20px;
    margin: 10px;
    font-family: 'Press Start 2P', cursive;
    font-size: 10px;
    cursor: pointer;
    display: inline-block;
}
.btn:hover { background: #475569; }
.hidden { display: none !important; }
input {
    font-family: 'Press Start 2P', cursive;
    padding: 10px;
    margin: 10px;
    width: 80%;
    max-width: 300px;
}
.stat-box {
    display: inline-block;
    border: 3px solid #fff;
    padding: 10px 20px;
    margin: 5px;
    background: #000;
    font-size: 8px;
}
.option-btn {
    display: block;
    width: 100%;
    max-width: 500px;
    margin: 10px auto;
    padding: 15px;
    background: #1e293b;
    border: 3px solid #fff;
    color: white;
    font-family: 'Press Start 2P', cursive;
    font-size: 9px;
    cursor: pointer;
    text-align: left;
}
.option-btn:hover { background: #334155; }
.option-btn.correct { background: #22c55e !important; }
.option-btn.wrong { background: #ef4444 !important; }
#modal {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.9);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
}
.modal-content {
    border: 4px solid #fff;
    box-shadow: 0 0 0 4px #000, 0 0 0 8px #fff;
    background: #1e293b;
    padding: 40px;
    max-width: 400px;
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen" class="pixel-border">
    <h1 style="color: #facc15; font-size: 12px; margin-bottom: 30px;">NUEVO JUGADOR</h1>
    <input type="text" id="player-name" placeholder="NOMBRE..." style="text-align: center;">
    <br>
    <button class="btn" onclick="savePlayer()">REGISTRARSE</button>
</div>

<!-- MENU -->
<div id="menu-screen" class="hidden">
    <div style="margin-bottom: 20px;">
        <button class="btn" onclick="showScoreboard()">📊 TABLERO</button>
        <button class="btn" onclick="logout()">🔄 CAMBIAR JUGADOR</button>
    </div>
    <div style="font-size: 8px; color: #22d3ee; margin-bottom: 20px;">
        HOLA, <span id="display-name"></span>
    </div>
    <div class="pixel-border">
        <h2 style="color: #facc15; font-size: 10px; margin-bottom: 20px;">ELIGE TU AVENTURA</h2>
        <button class="btn" onclick="start('matematicas')" style="display: block; width: 80%; margin: 10px auto;">🧮 MATEMÁTICAS</button>
        <button class="btn" onclick="start('espanol')" style="display: block; width: 80%; margin: 10px auto;">📚 ESPAÑOL</button>
        <button class="btn" onclick="start('historia')" style="display: block; width: 80%; margin: 10px auto;">⚔️ HISTORIA</button>
        <button class="btn" onclick="start('geografia')" style="display: block; width: 80%; margin: 10px auto;">🌍 GEOGRAFÍA</button>
        <button class="btn" onclick="start('ingles')" style="display: block; width: 80%; margin: 10px auto;">🇬 INGLÉS</button>
        <button class="btn" onclick="start('dragonball')" style="display: block; width: 80%; margin: 10px auto;">🐉 DRAGON BALL Z</button>
        <button class="btn" onclick="start('pokemon')" style="display: block; width: 80%; margin: 10px auto;">⚡ POKEMON</button>
    </div>
</div>

<!-- GAME -->
<div id="game-screen" class="hidden">
    <div style="margin-bottom: 20px;">
        <button class="btn" onclick="showScoreboard()">📊 TABLERO</button>
        <button class="btn" onclick="goBack()">⬅️ MENU</button>
    </div>
    <div style="margin: 20px 0;">
        <div class="stat-box">PUNTOS: <span id="h">0</span></div>
        <div class="stat-box">PISO: <span id="f-num">1</span></div>
    </div>
    <div class="pixel-border" style="margin: 20px auto;">
        <div id="q-text" style="font-size: 10px; line-height: 1.8; min-height: 60px;"></div>
    </div>
    <div id="options-grid"></div>
</div>

<!-- MODAL -->
<div id="modal">
    <div class="modal-content">
        <div id="m-icon" style="font-size: 48px; margin-bottom: 20px;"></div>
        <div id="m-title" style="font-size: 12px; margin-bottom: 15px; color: #facc15;"></div>
        <div id="m-desc" style="font-size: 8px; color: #94a3b8; margin-bottom: 30px; line-height: 1.6;"></div>
        <button class="btn" onclick="closeModal()" style="background: #fff; color: #000;">CONTINUAR</button>
    </div>
</div>

<!-- SCOREBOARD MODAL -->
<div id="scoreboard-modal" style="position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 1000;">
    <div class="modal-content" style="max-width: 500px; max-height: 80vh; overflow-y: auto;">
        <h3 style="color: #facc15; font-size: 10px; margin-bottom: 20px;">📊 TABLERO</h3>
        <div id="score-content"></div>
        <button class="btn" onclick="closeScoreboard()" style="background: #fff; color: #000; margin-top: 20px;">CERRAR</button>
    </div>
</div>

<script>
// --- BASE DE DATOS DE PREGUNTAS (3 por materia con pistas que NO revelan la respuesta) ---
const database = {
    matematicas: [
        { q: "Si 3 cuadernos cuestan $45, ¿cuánto pagarás por 12?", a: ["$135", "$180", "$150", "$200"], c: 1, p: "Piensa en cuántas veces más es 12 que 3." },
        { q: "Resultado de (10 + 5) * 2 - 10:", a: ["20", "15", "25", "30"], c: 0, p: "Recuerda resolver primero lo que está entre paréntesis." },
        { q: "¿Qué número sigue: 2, 6, 18, 54, __?", a: ["108", "162", "150", "200"], c: 1, p: "Cada número se multiplica por el mismo valor." }
    ],
    espanol: [
        { q: "Las palabras que llevan el acento en la última sílaba se llaman:", a: ["Graves", "Esdrújulas", "Agudas", "Sobresdrújulas"], c: 2, p: "Su nombre indica que están en la punta final." },
        { q: "¿Cuál de estas palabras es esdrújula?", a: ["Cámara", "Balón", "Silla", "Cantar"], c: 0, p: "Las esdrújulas siempre llevan tilde en la antepenúltima." },
        { q: "Palabra que indica una acción (Ej: Saltar):", a: ["Sustantivo", "Verbo", "Adjetivo", "Preposición"], c: 1, p: "Es la parte de la oración que muestra lo que se hace." }
    ],
    historia: [
        { q: "Primer presidente de México:", a: ["Juárez", "Guadalupe Victoria", "Hidalgo", "Madero"], c: 1, p: "Su apellido tiene dos partes y fue después de la independencia." },
        { q: "¿En qué año inició la Revolución Mexicana?", a: ["1810", "1910", "1917", "1821"], c: 1, p: "Fue en el siglo XX, exactamente 100 años después de la Independencia." },
        { q: "Civilización que construyó Chichén Itzá:", a: ["Azteca", "Inca", "Maya", "Olmeca"], c: 2, p: "Esta cultura se desarrolló en la península de Yucatán." }
    ],
    geografia: [
        { q: "¿Cuál es el país más grande del mundo?", a: ["China", "USA", "Rusia", "Canadá"], c: 2, p: "Está ubicado entre Europa y Asia." },
        { q: "¿Cuál es el río más largo del mundo?", a: ["Nilo", "Amazonas", "Misisipi", "Yangtsé"], c: 1, p: "Se encuentra en el continente sudamericano." },
        { q: "Capital de Francia:", a: ["Londres", "Berlín", "Madrid", "París"], c: 3, p: "Es conocida como la ciudad del amor y tiene una torre famosa." }
    ],
    ingles: [
        { q: "Choose the correct: She ___ my best friend.", a: ["am", "is", "are", "be"], c: 1, p: "Con She, He, It se usa la tercera persona del verbo to be." },
        { q: "Meaning of 'They':", a: ["Nosotros", "Ustedes", "Ellos/Ellas", "Él"], c: 2, p: "Se refiere a otras personas en plural." },
        { q: "Translate: 'Ventana'", a: ["Door", "Wall", "Window", "Floor"], c: 2, p: "Empieza con W y es por donde entra la luz." }
    ],
    dragonball: [
        { q: "¿Quién mató a Freezer?", a: ["Goku", "Vegeta", "Trunks", "Gohan"], c: 2, p: "Fue un guerrero que vino del futuro con cabello morado." },
        { q: "Planeta de Piccolo:", a: ["Vegueta", "Namekusei", "Tierra", "Kaio"], c: 1, p: "Es el planeta de los seres verdes con antenas." },
        { q: "¿Cuál es el nivel de poder de Goku al inicio de Z?", a: ["10", "100", "1000", "5"], c: 0, p: "Era un número muy bajo comparado con los Saiyajins." }
    ],
    pokemon: [
        { q: "¿Quién es el protagonista de la serie?", a: ["Gary", "Ash Ketchum", "Brock", "Misty"], c: 1, p: "Su nombre empieza con A y es de Pueblo Paleta." },
        { q: "¿Cuál es el Pokémon inicial de tipo fuego?", a: ["Squirtle", "Bulbasaur", "Charmander", "Pikachu"], c: 2, p: "Es un pequeño lagarto con llama en la cola." },
        { q: "¿Qué tipo de Pokémon es Pikachu?", a: ["Fuego", "Agua", "Eléctrico", "Psíquico"], c: 2, p: "Usa ataques de rayo y electricidad." }
    ]
};

let player = localStorage.getItem('player') || "";
let currentS = "";
let f = 0;
let hits = 0;
let attemptsOnCurrent = 0; // Contador de intentos por pregunta

function savePlayer() {
    const name = document.getElementById('player-name').value.trim();
    if(name) {
        localStorage.setItem('player', name);
        location.reload();
    }
}

function logout() {
    localStorage.removeItem('player');
    location.reload();
}

function start(subject) {
    currentS = subject;
    f = 0; 
    hits = 0;
    attemptsOnCurrent = 0;
    document.getElementById('menu-screen').classList.add('hidden');
    document.getElementById('game-screen').classList.remove('hidden');
    render();
}

function render() {
    const qs = database[currentS];
    if (!qs) {
        alert("Error: Materia no encontrada");
        goBack();
        return;
    }
    if (f >= qs.length) {
        showM("👑", "¡COMPLETADO!", `Obtuviste ${hits}/${qs.length} aciertos`);
        saveScore(hits, qs.length - hits);
        setTimeout(() => { goBack(); }, 2000);
        return;
    }
    document.getElementById('f-num').innerText = f + 1;
    document.getElementById('h').innerText = hits;
    document.getElementById('q-text').innerText = qs[f].q;
    const grid = document.getElementById('options-grid');
    grid.innerHTML = '';
    qs[f].a.forEach((txt, i) => {
        const b = document.createElement('button');
        b.className = 'option-btn';
        b.innerText = txt;
        b.onclick = () => check(i, b);
        grid.appendChild(b);
    });
}

function check(selectedIndex, buttonElement) {
    const qd = database[currentS][f];
    const buttons = document.querySelectorAll('.option-btn');
    
    // Deshabilitar todos los botones temporalmente
    buttons.forEach(btn => btn.disabled = true);
    
    if (selectedIndex === qd.c) {
        // RESPUESTA CORRECTA
        buttonElement.classList.add('correct');
        hits++;
        f++; // Avanzar a la siguiente pregunta
        attemptsOnCurrent = 0;
        showM("💎", "¡CORRECTO!", "+10 puntos - ¡Siguiente pregunta!");
        setTimeout(() => {
            closeModal();
            render();
        }, 1500);
    } else {
        // RESPUESTA INCORRECTA - NO AVANZAR
        buttonElement.classList.add('wrong');
        attemptsOnCurrent++;
        
        // Mostrar mensaje de error pero NO avanzar
        let hintMessage = `💡 PISTA: ${qd.p}`;
        if (attemptsOnCurrent >= 2) {
            hintMessage += "\n\n¡Tómate tu tiempo y piensa bien!";
        }
        
        showM("❌", "INTENTA DE NUEVO", hintMessage);
        
        setTimeout(() => {
            closeModal();
            // Reactivar botones para que pueda intentar de nuevo
            buttons.forEach(btn => {
                btn.disabled = false;
                btn.classList.remove('wrong');
            });
        }, 2000);
    }
    document.getElementById('h').innerText = hits;
}

function saveScore(correct, incorrect) {
    const scores = getScores();
    if(scores[currentS]) {
        scores[currentS].points += (correct * 10);
        scores[currentS].correct += correct;
        scores[currentS].incorrect += incorrect;
        localStorage.setItem(`scores_${player}`, JSON.stringify(scores));
    }
}

function showM(icon, title, desc) {
    document.getElementById('m-icon').innerText = icon;
    document.getElementById('m-title').innerText = title;
    document.getElementById('m-desc').innerText = desc;
    document.getElementById('modal').style.display = 'flex';
}

function closeModal() {
    document.getElementById('modal').style.display = 'none';
}

function goBack() {
    document.getElementById('game-screen').classList.add('hidden');
    document.getElementById('menu-screen').classList.remove('hidden');
}

function showScoreboard() {
    const scores = getScores();
    let html = '';
    Object.keys(scores).forEach(subj => {
        const s = scores[subj];
        html += `<div style="border: 2px solid #475569; padding: 10px; margin: 10px 0; font-size: 8px; text-align: left;">
            <strong style="color: #facc15;">${subj.toUpperCase()}</strong><br>
            Puntos: ${s.points} | Correctas: ${s.correct} | Errores: ${s.incorrect}
            </div>`;
    });
    document.getElementById('score-content').innerHTML = html || '<p style="font-size: 8px;">Sin datos aún</p>';
    document.getElementById('scoreboard-modal').style.display = 'flex';
}

function closeScoreboard() {
    document.getElementById('scoreboard-modal').style.display = 'none';
}

function getScores() {
    const saved = localStorage.getItem(`scores_${player}`);
    const defaultScores = {
        matematicas: { points: 0, correct: 0, incorrect: 0 },
        espanol: { points: 0, correct: 0, incorrect: 0 },
        historia: { points: 0, correct: 0, incorrect: 0 },
        geografia: { points: 0, correct: 0, incorrect: 0 },
        ingles: { points: 0, correct: 0, incorrect: 0 },
        dragonball: { points: 0, correct: 0, incorrect: 0 },
        pokemon: { points: 0, correct: 0, incorrect: 0 }
    };
    if (saved) {
        const parsed = JSON.parse(saved);
        return { ...defaultScores, ...parsed };
    }
    return defaultScores;
}

// Inicialización
if(player) {
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('menu-screen').classList.remove('hidden');
    document.getElementById('display-name').innerText = player.toUpperCase();
}
</script>
</body>
</html>
